<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <radialGradient id="lw-core" cx="30%" cy="22%" r="95%">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="20%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="78%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#022C22"/>
    </radialGradient>
    <linearGradient id="lw-shine" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lw-glow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lw-bottom" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#064E3B" stop-opacity="0"/>
      <stop offset="100%" stop-color="#022C22" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="lw-rim-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D1FAE5" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#D1FAE5" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="lw-drop" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#FDEAE0"/>
      <stop offset="55%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#8C3A24"/>
    </radialGradient>
    <filter id="lw-dropshadow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lw-letter-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0" dy="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mark (icône à gauche) -->
  <g filter="url(#lw-dropshadow)" transform="translate(10, 10)">
    <rect x="0" y="0" width="120" height="120" rx="30" fill="url(#lw-core)"/>
    <rect x="0" y="0" width="120" height="120" rx="30" fill="url(#lw-glow)"/>
    <rect x="0" y="0" width="120" height="120" rx="30" fill="url(#lw-bottom)"/>
    <rect x="0.8" y="0.8" width="118.4" height="118.4" rx="29.2"
          fill="none" stroke="#D1FAE5" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M 32 0 L 88 0 Q 120 0 120 30 L 120 55 Q 88 42 60 42 Q 32 42 0 55 L 0 30 Q 0 0 32 0 Z"
          fill="url(#lw-shine)"/>
    <path d="M 32 1 L 88 1 Q 119 1 119 30" fill="none"
          stroke="url(#lw-rim-top)" stroke-width="1.2" stroke-linecap="round"/>
    <text x="60" y="88" text-anchor="middle"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-weight="700" font-size="82" fill="#FAF7F0"
          filter="url(#lw-letter-shadow)"
          style="font-variation-settings:'opsz' 144,'wght' 700">G</text>
    <g transform="translate(92, 28)">
      <path d="M 0 -10 C 0 -10, -7 -2, -7 2.5 C -7 6, -4 9, 0 9 C 4 9, 7 6, 7 2.5 C 7 -2, 0 -10, 0 -10 Z"
            fill="url(#lw-drop)"/>
      <ellipse cx="-2.2" cy="-1" rx="1.6" ry="2.8" fill="#FFFFFF" opacity="0.6"/>
    </g>
  </g>

  <!-- Wordmark à droite -->
  <g transform="translate(150, 0)">
    <text x="0" y="72" font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-weight="600" font-size="46" fill="#1C1917"
          style="font-variation-settings:'opsz' 144,'wght' 600;letter-spacing:-0.02em">
      Global Clean
    </text>
    <text x="0" y="108" font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-style="italic" font-weight="400" font-size="30" fill="#D97757"
          style="font-variation-settings:'opsz' 144,'wght' 400;letter-spacing:-0.01em">
      Home
    </text>
    <!-- Sous-titre mono -->
    <text x="0" y="128" font-family="'JetBrains Mono', ui-monospace, monospace"
          font-weight="500" font-size="11" fill="#78716C"
          style="letter-spacing:0.15em;text-transform:uppercase">
      Atelier · CRM
    </text>
  </g>
</svg>
