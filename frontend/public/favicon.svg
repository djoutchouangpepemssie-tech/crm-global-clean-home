<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="fc" cx="28%" cy="18%" r="105%">
      <stop offset="0%"  stop-color="#A7F3D0"/>
      <stop offset="30%" stop-color="#10B981"/>
      <stop offset="70%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#012117"/>
    </radialGradient>
    <linearGradient id="fs" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <radialGradient id="fd" cx="35%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#FDEAE0"/>
      <stop offset="55%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#6B2817"/>
    </radialGradient>
  </defs>

  <!-- Socle liquid glass -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#fc)"/>
  <!-- Reflet supérieur -->
  <rect x="3" y="3" width="58" height="28" rx="13" fill="url(#fs)"/>
  <!-- Rim brillant -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5"
        fill="none" stroke="url(#fr)" stroke-width="1" stroke-opacity="0.55"/>

  <!-- GCH Fraunces (taille optimisée pour 16-32-64px) -->
  <text x="32" y="42" text-anchor="middle"
        font-family="Fraunces, 'Playfair Display', Georgia, serif"
        font-weight="700" font-size="24" fill="#FAF7F0" letter-spacing="0.5"
        style="font-variation-settings:'opsz' 144,'wght' 700">GCH</text>

  <!-- Goutte signature haut-droite -->
  <circle cx="50" cy="14" r="3" fill="url(#fd)"/>
  <circle cx="49" cy="13" r="0.9" fill="#FFFFFF" opacity="0.7"/>
</svg>
