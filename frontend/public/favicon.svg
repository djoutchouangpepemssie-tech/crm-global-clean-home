<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Core liquid glass : émeraude profond avec point lumineux haut-gauche -->
    <radialGradient id="fg-core" cx="32%" cy="24%" r="88%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="30%" stop-color="#10B981"/>
      <stop offset="65%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#022C22"/>
    </radialGradient>
    <!-- Highlight supérieur (reflet verre) -->
    <linearGradient id="fg-shine" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Rim lumineux (bord du verre) -->
    <linearGradient id="fg-rim" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D1FAE5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#022C22" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Drop accent terracotta (symbole eau propre) -->
    <radialGradient id="fg-drop" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FDEAE0"/>
      <stop offset="55%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#A04A30"/>
    </radialGradient>
  </defs>

  <!-- Socle glass émeraude -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#fg-core)"/>
  <!-- Rim verre -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5"
        fill="none" stroke="url(#fg-rim)" stroke-width="1"/>
  <!-- Reflet supérieur -->
  <rect x="4" y="4" width="56" height="26" rx="13" fill="url(#fg-shine)"/>

  <!-- Lettre G Fraunces — grosse, crème, lisible à 16px -->
  <text x="32" y="46" text-anchor="middle"
        font-family="Fraunces, 'Playfair Display', Georgia, serif"
        font-weight="700" font-size="40" fill="#FAF7F0"
        style="font-variation-settings:'opsz' 144,'wght' 700">G</text>

  <!-- Micro-goutte terracotta (accent signature) -->
  <circle cx="48" cy="16" r="3.5" fill="url(#fg-drop)"/>
  <circle cx="47" cy="14.5" r="1" fill="#FFFFFF" opacity="0.7"/>
</svg>
